<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tópico · Concurso MPMG</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body class="theme-resumos">

<header class="app-header">
  <div class="container">
    <div class="back-bar">
      <a href="index.html">← Painel</a>
      <span class="breadcrumb" id="hdr-breadcrumb">Resumos</span>
    </div>
    <h1 class="small" id="hdr-title">Carregando…</h1>
    <p class="subtitle tight" id="hdr-subtitle"></p>
  </div>
</header>

<main class="container-narrow topic-layout">
  <aside class="topic-toc" id="topic-toc" aria-label="Sumário do tópico"></aside>

  <article class="article-block" id="article-content">
    <div class="empty-state">
      <span class="icon">⏳</span>
      Carregando tópico…
    </div>
  </article>

  <nav class="topic-nav" id="topic-nav">
    <a href="index.html#bloco-2">↑ Voltar ao painel</a>
  </nav>
</main>

<footer>
  <p>📚 Projeto Concurso MPMG · Estudo é constância, não intensidade</p>
</footer>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script>
(function () {
  const id = App.getQueryParam('id') || (APP_DATA.topics[0] && APP_DATA.topics[0].id);
  const topic = App.getTopic(id);
  const article = document.getElementById('article-content');

  if (!topic) {
    article.innerHTML = `
      <div class="empty-state">
        <span class="icon">❓</span>
        Tópico não encontrado. <a href="index.html">Voltar ao painel</a>.
      </div>`;
    return;
  }

  // detecta esqueleto (sections vazias) — modo "🚧 Em construção"
  const isStub = !topic.sections || topic.sections.length === 0;
  const _mat = (topic.materia || 'pc');
  const _matMeta = App.getMateria(_mat);
  const numLabel = `${_matMeta.prefix.trim()} ${topic.num}`;

  // breadcrumb dinâmico
  const bc = document.getElementById('hdr-breadcrumb');
  if (bc) bc.textContent = `Resumos · ${_matMeta.label}`;

  // pools para Quick check (visível tanto no markup, quanto no setup)
  // Filtra por tópico E matéria — flashcards e questões sem 'materia' são considerados 'pc'
  const topicCards = (window.APP_DATA.flashcards || []).filter(f => f.topic === topic.num && (f.materia || 'pc') === _mat);
  const topicQs = (window.APP_DATA.questions || []).filter(q => q.topic === topic.num && (q.materia || 'pc') === _mat);

  // título e subtítulo
  document.title = `${numLabel} · ${topic.title}`;
  document.getElementById('hdr-title').textContent = `${numLabel} · ${topic.title}`;
  document.getElementById('hdr-subtitle').textContent = isStub
    ? `Edital ${topic.edital} · 🚧 Em construção`
    : `Edital ${topic.edital} · ${topic.size}`;

  // monta artigo
  const html = [];
  html.push(`<h1>${App.escape(topic.title)}</h1>`);

  // callout edital
  html.push(`<div class="callout callout-edital"><strong>Texto do edital (${topic.edital}):</strong> ${App.escape(topic.editalText)}</div>`);

  if (isStub) {
    html.push(`<div class="content-box box-info"><div class="box-label">🚧 Em construção</div><div class="box-body">Este tópico ainda não foi escrito. Voltaremos aqui quando esta fase começar — o sumário abaixo já indica o que vai entrar.</div></div>`);
    if (topic.outline && topic.outline.length) {
      html.push('<h2>Sumário previsto</h2>');
      html.push('<ul>' + topic.outline.map(s => `<li>${App.escape(s)}</li>`).join('') + '</ul>');
    }
  } else {

  // meta bar
  const metaItems = [];
  metaItems.push(`<span class="meta-item">📋 <strong>Tamanho:</strong> ${App.escape(topic.size)}</span>`);
  metaItems.push(`<span class="meta-item">📅 <strong>Cronograma:</strong> ${App.escape(topic.schedule)}</span>`);
  if (topic.advantage) {
    metaItems.push(`<span class="meta-item">⭐ <strong>Vantagem:</strong> ${App.escape(topic.advantage)}</span>`);
  }
  html.push(`<div class="meta-bar">${metaItems.join('')}</div>`);

  // ----- Audio controls (TTS) -----
  html.push(`
    <div class="audio-controls" id="audio-controls" style="display:none;">
      <button class="btn btn-sm btn-theme" id="audio-play">🔊 Ouvir</button>
      <button class="btn btn-sm" id="audio-pause" style="display:none;">⏸️ Pausar</button>
      <button class="btn btn-sm" id="audio-stop" style="display:none;">⏹️ Parar</button>
      <label>Velocidade:</label>
      <select id="audio-speed">
        <option value="0.85">0.85x</option>
        <option value="1" selected>1x</option>
        <option value="1.15">1.15x</option>
        <option value="1.3">1.3x</option>
        <option value="1.5">1.5x</option>
        <option value="1.75">1.75x</option>
        <option value="2">2x ⚡</option>
      </select>
      <label>Voz:</label>
      <button class="btn btn-sm" id="voice-male" title="Melhor voz masculina pt-BR disponível">♂</button>
      <button class="btn btn-sm" id="voice-female" title="Melhor voz feminina pt-BR disponível">♀</button>
      <select id="audio-voice"><option>Carregando…</option></select>
      <button class="btn btn-sm btn-premium-help" id="voice-premium-help" title="Como deixar a voz mais natural">⭐ Voz Premium</button>
      <span class="audio-status" id="audio-status"></span>
      <div class="audio-help" id="audio-help" style="display:none;"></div>
    </div>
  `);

  // Status (controles persistentes)
  html.push(`
    <h2>Status</h2>
    <div class="status-checks" id="status-checks">
      <label class="status-check"><input type="checkbox" data-status="iniciado"><span>Iniciado</span></label>
      <label class="status-check"><input type="checkbox" data-status="resumo"><span>Resumo concluído</span></label>
      <label class="status-check"><input type="checkbox" data-status="questoes"><span>Questões feitas</span></label>
      <label class="status-check"><input type="checkbox" data-status="flashcards"><span>Flashcards criados</span></label>
      <label class="status-check"><input type="checkbox" data-status="revisao"><span>Em revisão espaçada</span></label>
    </div>
  `);

  // ----- inline markdown-mini: **bold**, *italic*, `code` -----
  function inlineMd(text) {
    return App.escape(text)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|[\s(])\*([^*\s][^*]*?)\*(?=[\s.,;:!?)]|$)/g, '$1<em>$2</em>');
  }

  // ----- render de um item (string legado OU objeto tipado) -----
  function renderItem(item) {
    if (typeof item === 'string') return `<li>${inlineMd(item)}</li>`;
    if (!item || !item.type) return '';
    switch (item.type) {
      case 'p':
        return `<p>${inlineMd(item.text || '')}</p>`;
      case 'h':
        return `<h3>${inlineMd(item.text || '')}</h3>`;
      case 'list': {
        const inner = (item.items || []).map(s => `<li>${inlineMd(s)}</li>`).join('');
        return `<ul>${inner}</ul>`;
      }
      case 'table': {
        const heads = (item.headers || []).map(h => `<th>${inlineMd(h)}</th>`).join('');
        const rows = (item.rows || []).map(r =>
          `<tr>${r.map(c => `<td>${inlineMd(c)}</td>`).join('')}</tr>`
        ).join('');
        return `<div class="table-wrap"><table class="content-table"><thead><tr>${heads}</tr></thead><tbody>${rows}</tbody></table></div>`;
      }
      case 'box': {
        const kind = item.kind || 'info';
        const labels = {
          macete: '💡 Macete',
          jurisprudencia: '📖 Jurisprudência',
          atencao: '⚠️ Atenção',
          info: 'ℹ️ Nota',
          conexao: '🔗 Conexão'
        };
        const label = labels[kind] || labels.info;
        return `<div class="content-box box-${App.escape(kind)}"><div class="box-label">${label}</div><div class="box-body">${inlineMd(item.text || '')}</div></div>`;
      }
      default:
        return '';
    }
  }

  // Sections de conteúdo
  topic.sections.forEach(sec => {
    html.push(`<h2>${App.escape(sec.h)}</h2>`);
    if (sec.items && sec.items.length) {
      // detecta se é lista de strings (legado) ou blocos tipados (novo)
      const allStrings = sec.items.every(i => typeof i === 'string');
      if (allStrings) {
        html.push('<ul>');
        sec.items.forEach(item => html.push(renderItem(item)));
        html.push('</ul>');
      } else {
        // mistura ou só objetos: renderiza cada um livremente, agrupando strings em <li>
        let openUl = false;
        sec.items.forEach(item => {
          if (typeof item === 'string') {
            if (!openUl) { html.push('<ul>'); openUl = true; }
            html.push(renderItem(item));
          } else {
            if (openUl) { html.push('</ul>'); openUl = false; }
            html.push(renderItem(item));
          }
        });
        if (openUl) html.push('</ul>');
      }
    }
  });

  // ----- Quick check (inline runners) -----
  // pools (topicCards / topicQs) já calculados no escopo principal
  if (topicCards.length || topicQs.length) {
    html.push('<h2>🎯 Quick check do tópico</h2>');
    html.push('<p style="color:var(--text-muted); font-size:0.85rem;">Mini-prática inline — flashcard e questão sorteados deste tópico. SM-2 e log de erros são compartilhados com o modo completo.</p>');
    if (topicCards.length) {
      html.push(`
        <div class="card" id="qc-flash" style="margin-top:0.6rem;">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:0.5rem; flex-wrap:wrap;">
            <strong>🃏 Mini-flashcard</strong>
            <span style="color:var(--text-muted); font-size:0.85rem;">${topicCards.length} disponível(eis)</span>
          </div>
          <div id="qc-flash-body" style="margin-top:0.6rem;"></div>
        </div>`);
    }
    if (topicQs.length) {
      html.push(`
        <div class="card" id="qc-q" style="margin-top:0.6rem;">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:0.5rem; flex-wrap:wrap;">
            <strong>✍️ Mini-questão</strong>
            <span style="color:var(--text-muted); font-size:0.85rem;">${topicQs.length} disponível(eis)</span>
          </div>
          <div id="qc-q-body" style="margin-top:0.6rem;"></div>
        </div>`);
    }
  }

  // Notas pessoais
  html.push(`
    <h2>📝 Suas notas pessoais</h2>
    <p style="color:var(--text-muted); font-size:0.85rem;">Salvas automaticamente neste navegador. Use para anotar dúvidas, esquemas, mnemônicos.</p>
    <textarea id="notes" placeholder="Anote aqui suas dúvidas, esquemas, conceitos que não fixou…"></textarea>
    <p class="form-help">💾 Salva automaticamente · ✋ Não sincroniza entre dispositivos</p>
  `);

  // ações rápidas para outros recursos
  html.push(`
    <h2>🚀 Ações rápidas</h2>
    <div class="btn-row" style="margin-top:0.5rem;">
      <a class="btn btn-success btn-sm" href="flashcards.html?topic=${topic.num}">🃏 Flashcards deste tópico</a>
      <a class="btn btn-danger btn-sm" href="simulado.html?topic=${topic.num}">✍️ Questões deste tópico</a>
      <a class="btn btn-sm" href="log.html#novo">📝 Registrar estudo de hoje</a>
      <a class="btn btn-sm" href="referencia.html?topic=${topic.num}">📚 Súmulas relacionadas</a>
    </div>
  `);

  } /* end if(!isStub) */

  article.innerHTML = html.join('\n');

  // ---- TOC interno (sumário lateral com âncoras nos <h2>) ----
  (function buildTOC() {
    const toc = document.getElementById('topic-toc');
    if (!toc) return;
    const headings = article.querySelectorAll('h2');
    if (headings.length < 2) { toc.style.display = 'none'; return; }

    const slug = (s) => s.toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 60);

    const links = [];
    const used = new Set();
    headings.forEach(h => {
      let s = slug(h.textContent);
      let base = s, n = 2;
      while (used.has(s)) { s = base + '-' + n++; }
      used.add(s);
      h.id = s;
      links.push(`<li><a href="#${s}">${App.escape(h.textContent)}</a></li>`);
    });

    toc.innerHTML = `
      <div class="toc-inner">
        <div class="toc-header">📑 Sumário</div>
        <ul class="toc-list">${links.join('')}</ul>
      </div>`;

    // Scroll spy — destaca link do <h2> visível
    const tocLinks = toc.querySelectorAll('a[href^="#"]');
    const setActive = (id) => {
      tocLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + id));
    };
    if ('IntersectionObserver' in window) {
      const obs = new IntersectionObserver((entries) => {
        const visible = entries.filter(e => e.isIntersecting)
          .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top)[0];
        if (visible) setActive(visible.target.id);
      }, { rootMargin: '-80px 0px -60% 0px', threshold: 0 });
      headings.forEach(h => obs.observe(h));
    }
  })();

  if (!isStub) {

  // ---- Status persistente ----
  const statusKey = `topic-status-${topic.id}`;
  const status = App.load(statusKey, {});
  document.querySelectorAll('#status-checks input[type="checkbox"]').forEach(cb => {
    const k = cb.dataset.status;
    if (status[k]) {
      cb.checked = true;
      cb.closest('.status-check').classList.add('checked');
    }
    cb.addEventListener('change', () => {
      status[k] = cb.checked;
      App.save(statusKey, status);
      cb.closest('.status-check').classList.toggle('checked', cb.checked);
      // sincroniza checklist do index (Fase 1) — se "resumo" marcado, marca o item correspondente
      const indexKey = 'checklist-fase1';
      const idx = App.load(indexKey, {});
      const indexId = `t${topic.num}`;
      idx[indexId] = !!status.resumo;
      App.save(indexKey, idx);
    });
  });

  // ---- Notas persistentes ----
  const notesKey = `topic-notes-${topic.id}`;
  const ta = document.getElementById('notes');
  ta.value = App.load(notesKey, '') || '';
  let saveTimer;
  ta.addEventListener('input', () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      App.save(notesKey, ta.value);
      App.toast('Notas salvas');
    }, 600);
  });

  // ---- QUICK CHECK (inline runners) ----
  (function initQuickCheck() {
    // Mini-flashcard com SM-2 (interopera com flashcards-state)
    const flashBody = document.getElementById('qc-flash-body');
    if (flashBody && topicCards.length) {
      const SM_KEY = 'flashcards-state';
      let curCard = null;

      function pickCard() {
        // prioriza vencidos, depois novos, depois aleatório
        const today = App.today();
        const sm = App.load(SM_KEY, {});
        const due = topicCards.filter(c => sm[c.id] && sm[c.id].dueDate && new Date(sm[c.id].dueDate) <= today);
        const fresh = topicCards.filter(c => !sm[c.id] || sm[c.id].reps === 0);
        const pool = due.length ? due : (fresh.length ? fresh : topicCards);
        curCard = pool[Math.floor(Math.random() * pool.length)];
        renderQuestion();
      }

      function renderQuestion() {
        flashBody.innerHTML = `
          <div style="font-size:0.95rem; line-height:1.5;">${App.escape(curCard.q)}</div>
          <div class="btn-row" style="margin-top:0.7rem;">
            <button class="btn btn-sm btn-theme" data-act="show">Ver resposta</button>
            <button class="btn btn-sm btn-ghost" data-act="skip">↻ Outro</button>
          </div>`;
        flashBody.querySelector('[data-act="show"]').addEventListener('click', renderAnswer);
        flashBody.querySelector('[data-act="skip"]').addEventListener('click', pickCard);
      }

      function renderAnswer() {
        flashBody.innerHTML = `
          <div style="font-size:0.85rem; color:var(--text-muted); margin-bottom:0.4rem;">${App.escape(curCard.q)}</div>
          <div style="font-size:0.95rem; line-height:1.5;"><strong>${App.escape(curCard.a)}</strong></div>
          <div style="margin-top:0.4rem; font-size:0.78rem; color:var(--text-muted);">Como foi? Atualiza o SM-2 deste card.</div>
          <div class="btn-row" style="margin-top:0.5rem; flex-wrap:wrap;">
            <button class="btn btn-sm btn-danger" data-grade="0">De novo</button>
            <button class="btn btn-sm" data-grade="2">Difícil</button>
            <button class="btn btn-sm btn-success" data-grade="3">Bom</button>
            <button class="btn btn-sm btn-primary" data-grade="4">Fácil</button>
          </div>`;
        flashBody.querySelectorAll('button[data-grade]').forEach(b => {
          b.addEventListener('click', () => grade(parseInt(b.dataset.grade)));
        });
      }

      function grade(g) {
        const sm = App.load(SM_KEY, {});
        const s = sm[curCard.id] || { ease: 2.5, interval: 0, dueDate: null, reps: 0, lapses: 0, learned: false };
        s.reps = (s.reps || 0) + 1;
        if (g === 0) {
          s.lapses = (s.lapses || 0) + 1;
          s.interval = 0;
          s.ease = Math.max(1.3, s.ease - 0.2);
          s.dueDate = App.today().toISOString();
        } else {
          if (g === 2) {
            s.interval = s.interval === 0 ? 1 : Math.max(1, Math.round(s.interval * 1.2));
            s.ease = Math.max(1.3, s.ease - 0.15);
          } else if (g === 3) {
            if (s.interval === 0) s.interval = 1;
            else if (s.interval === 1) s.interval = 3;
            else s.interval = Math.round(s.interval * s.ease);
          } else if (g === 4) {
            if (s.interval === 0) s.interval = 3;
            else s.interval = Math.round(s.interval * s.ease * 1.3);
            s.ease = s.ease + 0.1;
          }
          s.dueDate = App.addDays(App.today(), s.interval).toISOString();
          if (s.reps >= 3 && s.interval >= 7) s.learned = true;
        }
        sm[curCard.id] = s;
        App.save(SM_KEY, sm);
        App.toast('SM-2 atualizado · próximo em ' + (s.interval || 0) + 'd');
        pickCard();
      }

      pickCard();
    }

    // Mini-questão (interopera com log-erros)
    const qBody = document.getElementById('qc-q-body');
    if (qBody && topicQs.length) {
      const ERR_KEY = 'log-erros';
      let curQ = null;
      let answered = false;

      function pickQ() {
        answered = false;
        curQ = topicQs[Math.floor(Math.random() * topicQs.length)];
        renderQ();
      }

      function renderQ() {
        const altsHtml = curQ.alternatives.map((alt, i) => {
          const letter = String.fromCharCode(65 + i);
          return `<button class="alternative qc-alt" data-letter="${letter}" style="display:block; width:100%; text-align:left; margin-top:0.3rem; padding:0.55rem 0.7rem; border:1px solid var(--border); background:white; border-radius:6px; cursor:pointer; font-size:0.9rem;">
            <span class="letter" style="font-weight:600;">${letter})</span> ${App.escape(alt)}
          </button>`;
        }).join('');
        qBody.innerHTML = `
          <div style="font-size:0.85rem; color:var(--text-muted);">${App.escape(curQ.banca || 'Banca')} · Nível ${App.escape(curQ.nivel || 'Médio')}</div>
          <div style="font-size:0.93rem; line-height:1.5; margin-top:0.4rem;">${App.escape(curQ.statement)}</div>
          <div style="margin-top:0.5rem;">${altsHtml}</div>
          <div id="qc-q-explain" style="display:none; margin-top:0.6rem;"></div>
          <div class="btn-row" style="margin-top:0.6rem;">
            <button class="btn btn-sm btn-ghost" data-act="skip">↻ Outra</button>
          </div>`;
        qBody.querySelectorAll('.qc-alt').forEach(b => {
          b.addEventListener('click', () => answer(b.dataset.letter));
        });
        qBody.querySelector('[data-act="skip"]').addEventListener('click', pickQ);
      }

      function answer(letter) {
        if (answered) return;
        answered = true;
        const right = letter === curQ.correct;
        qBody.querySelectorAll('.qc-alt').forEach(b => {
          const l = b.dataset.letter;
          b.disabled = true;
          b.style.cursor = 'default';
          if (l === curQ.correct) { b.style.background = '#d1fae5'; b.style.borderColor = '#10b981'; }
          if (l === letter && !right) { b.style.background = '#fee2e2'; b.style.borderColor = '#ef4444'; }
        });
        const ex = document.getElementById('qc-q-explain');
        ex.style.display = '';
        ex.className = 'content-box ' + (right ? 'box-conexao' : 'box-atencao');
        ex.innerHTML = `<div class="box-label">${right ? '✅ Correto' : '❌ Errou — gabarito: ' + curQ.correct}</div><div class="box-body">${App.escape(curQ.explanation)}</div>`;
        if (!right) {
          const errLog = App.load(ERR_KEY, []);
          errLog.push({
            date: new Date().toISOString(),
            questionId: curQ.id,
            topic: curQ.topic,
            statement: curQ.statement,
            given: letter,
            correct: curQ.correct,
            explanation: curQ.explanation,
            inline: true
          });
          App.save(ERR_KEY, errLog);
          App.toast('Erro registrado no log');
        }
      }

      pickQ();
    }
  })();

  // ---- AUDIO MODE (TTS via SpeechSynthesis API) ----
  (function initAudio() {
    if (!('speechSynthesis' in window)) return;
    const ctrl = document.getElementById('audio-controls');
    if (!ctrl) return;
    ctrl.style.display = 'flex';

    const playBtn = document.getElementById('audio-play');
    const pauseBtn = document.getElementById('audio-pause');
    const stopBtn = document.getElementById('audio-stop');
    const speedEl = document.getElementById('audio-speed');
    const voiceEl = document.getElementById('audio-voice');
    const statusEl = document.getElementById('audio-status');
    const premiumBtn = document.getElementById('voice-premium-help');
    const helpEl = document.getElementById('audio-help');

    let voices = [];
    let chunks = [];
    let idx = 0;

    // ===== Voz Premium: deep-link para Ajustes do Sistema =====
    const ua = navigator.userAgent;
    const isMac = /Macintosh/.test(ua) && !/iPhone|iPad/.test(ua);
    const isIOS = /iPhone|iPad|iPod/.test(ua);
    const isWindows = /Windows/.test(ua);
    const isChrome = /Chrome/.test(ua) && !/Edge|OPR/.test(ua);

    function buildHelpHtml() {
      if (isMac) {
        return `
          <p><b>Voz Premium grátis</b> — Felipe (M) ou Luciana (F) Premium da Apple. Voz neural, qualidade igual a opções pagas.</p>
          <button class="btn btn-sm btn-theme" id="open-mac-settings">⚙️ Abrir Ajustes → Voz do Sistema</button>
          <ol>
            <li>Clique no botão acima — abre Ajustes na seção certa.</li>
            <li>Role até <b>Leitura e Fala</b> (em macOS Sequoia/26; nas versões antigas: <b>Conteúdo Falado</b>).</li>
            <li>Na linha <b>Voz do Sistema</b>, clique no <b>ícone ⓘ</b> ou <b>na linha</b> (não no dropdown da voz) — abre uma janela completa de vozes.</li>
            <li>Em <b>Português (Brasil)</b>, marque ⭐ <b>Felipe (Premium)</b> ou ⭐ <b>Luciana (Premium)</b> → <b>OK</b>.</li>
            <li>Aguarde download (~150MB cada), volte aqui e clique em "🔄 Já instalei" abaixo.</li>
          </ol>
          <p style="font-size: 0.85em;"><b>Não consegue encontrar?</b> Cole no Terminal (Aplicativos → Utilitários → Terminal):<br>
          <code style="background: var(--bg-soft); padding: 0.15rem 0.4rem; border-radius: 4px; user-select: all;">open "x-apple.systempreferences:com.apple.preference.universalaccess?Speech"</code></p>
          <p style="font-size: 0.8em; opacity: 0.75;">Se nada funcionar, plano final: <b>Cmd+F5</b> liga VoiceOver, <b>Cmd+Opt+F8</b> abre Utilitário do VoiceOver → aba <b>Fala</b> → <b>Vozes</b> → <b>Personalizar…</b>. Cmd+F5 de novo desliga VoiceOver.</p>
        `;
      }
      if (isIOS) {
        return `
          <p><b>Voz Premium grátis</b> — instale Felipe (M) ou Luciana (F) Premium da Apple.</p>
          <ol>
            <li><b>Ajustes</b> → <b>Acessibilidade</b> → <b>Conteúdo Falado</b> → <b>Vozes</b></li>
            <li><b>Português</b> → <b>Brasil</b></li>
            <li>Toque em ⬇️ ao lado de <b>Felipe</b> ou <b>Luciana</b> (variante "Aprimorada")</li>
            <li>Aguarde download, volte ao Safari, recarregue a página</li>
          </ol>
        `;
      }
      if (isWindows) {
        return `
          <p><b>Voz Premium grátis no Windows 11.</b></p>
          <ol>
            <li><b>Configurações</b> → <b>Hora e Idioma</b> → <b>Fala</b></li>
            <li>Clique <b>Adicionar voz</b> → escolher <b>Português (Brasil)</b></li>
            <li>Marque <b>Antônio (Neural)</b> [M] ou <b>Francisca (Neural)</b> [F]</li>
            <li>Aguarde download e recarregue esta página</li>
          </ol>
        `;
      }
      // Outros (Linux, Android, etc.)
      return `
        <p>Para vozes mais naturais, use <b>Chrome</b> — vem com voz "Google português do Brasil" sem precisar instalar nada. Já deve estar listada no dropdown de Voz acima.</p>
        <p style="font-size: 0.85em;">Se estiver em Android, qualquer app TTS Premium da Play Store também funciona.</p>
      `;
    }

    premiumBtn.addEventListener('click', () => {
      const isOpen = helpEl.style.display === 'block';
      if (isOpen) {
        helpEl.style.display = 'none';
        return;
      }
      helpEl.innerHTML = buildHelpHtml();
      helpEl.style.display = 'block';

      const macBtn = document.getElementById('open-mac-settings');
      if (macBtn) {
        macBtn.addEventListener('click', () => {
          // Deep-link para Acessibilidade no macOS (funciona em Sonoma+)
          window.location.href = 'x-apple.systempreferences:com.apple.preference.universalaccess';
          macBtn.textContent = '✅ Abriu Ajustes — siga os passos abaixo';
          macBtn.disabled = true;
          // Adiciona botão de reload depois de alguns segundos
          setTimeout(() => {
            const reloadBtn = document.createElement('button');
            reloadBtn.className = 'btn btn-sm btn-theme';
            reloadBtn.style.marginTop = '0.4rem';
            reloadBtn.textContent = '🔄 Já instalei — recarregar página';
            reloadBtn.addEventListener('click', () => location.reload());
            macBtn.parentNode.insertBefore(reloadBtn, macBtn.nextSibling);
          }, 3000);
        });
      }
    });

    const VOICE_GENDER = {
      felipe: 'M', daniel: 'M', ricardo: 'M', antonio: 'M', 'antônio': 'M',
      diego: 'M', joao: 'M', 'joão': 'M', rafael: 'M', thiago: 'M', fabio: 'M', 'fábio': 'M',
      luciana: 'F', joana: 'F', maria: 'F', francisca: 'F', helena: 'F',
      vitoria: 'F', 'vitória': 'F', camila: 'F', isabela: 'F', leticia: 'F', 'letícia': 'F',
    };
    function voiceGender(name) {
      const lower = name.toLowerCase();
      for (const k in VOICE_GENDER) if (lower.includes(k)) return VOICE_GENDER[k];
      return null;
    }
    function isPremium(name) {
      return /premium|enhanced|aprimorad|natural|neural|wavenet|cloud/i.test(name);
    }
    function qualityScore(v) {
      let s = 0;
      if (isPremium(v.name)) s += 1000;
      if (/google/i.test(v.name)) s += 100;
      if (/microsoft/i.test(v.name)) s += 80;
      if (v.localService === false) s += 50;
      if (/pt[-_]br/i.test(v.lang)) s += 30;
      return s;
    }

    function loadVoices() {
      const all = window.speechSynthesis.getVoices();
      voices = all.filter(v => /^pt(-|_|$)/i.test(v.lang));
      if (voices.length === 0) voices = all;
      if (voices.length === 0) {
        voiceEl.innerHTML = '<option value="">(sem vozes disponíveis)</option>';
        playBtn.disabled = true;
        return;
      }
      voices = voices.slice().sort((a, b) => qualityScore(b) - qualityScore(a));

      voiceEl.innerHTML = voices.map((v, i) => {
        const g = voiceGender(v.name);
        const star = isPremium(v.name) ? '⭐ ' : '';
        const tag = g ? ` [${g}]` : '';
        return `<option value="${i}">${star}${App.escape(v.name)}${tag} — ${v.lang}</option>`;
      }).join('');

      const savedName = localStorage.getItem('concurso-mpmg-voice-name');
      let pick = -1;
      if (savedName) pick = voices.findIndex(v => v.name === savedName);
      if (pick < 0) pick = voices.findIndex(v => /pt[-_]br/i.test(v.lang) && voiceGender(v.name) === 'M');
      if (pick < 0) pick = voices.findIndex(v => /pt[-_]br/i.test(v.lang));
      if (pick < 0) pick = 0;
      voiceEl.value = String(pick);
    }

    function pickGender(g) {
      let i = voices.findIndex(v => /pt[-_]br/i.test(v.lang) && voiceGender(v.name) === g);
      if (i < 0) i = voices.findIndex(v => voiceGender(v.name) === g);
      if (i >= 0) {
        voiceEl.value = String(i);
        voiceEl.dispatchEvent(new Event('change'));
      }
    }
    document.getElementById('voice-male').addEventListener('click', () => pickGender('M'));
    document.getElementById('voice-female').addEventListener('click', () => pickGender('F'));
    voiceEl.addEventListener('change', () => {
      const i = parseInt(voiceEl.value);
      if (!isNaN(i) && voices[i]) localStorage.setItem('concurso-mpmg-voice-name', voices[i].name);
    });

    const savedSpeed = localStorage.getItem('concurso-mpmg-voice-speed');
    if (savedSpeed && [...speedEl.options].some(o => o.value === savedSpeed)) {
      speedEl.value = savedSpeed;
    }
    speedEl.addEventListener('change', () => {
      localStorage.setItem('concurso-mpmg-voice-speed', speedEl.value);
    });

    if (window.speechSynthesis.getVoices().length > 0) loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;

    function getChunks() {
      const article = document.getElementById('article-content');
      const skipH2 = new Set(['Status', '📝 Suas notas pessoais', '🚀 Ações rápidas', '🎯 Quick check do tópico', 'Sumário previsto']);
      const out = [];
      let inSkip = false;
      Array.from(article.children).forEach(el => {
        const tag = el.tagName;
        if (tag === 'H1') {
          out.push(el.textContent.trim() + '.');
        } else if (tag === 'H2') {
          const txt = el.textContent.trim();
          inSkip = skipH2.has(txt);
          if (!inSkip) out.push('Seção: ' + txt + '.');
        } else if (tag === 'H3') {
          if (!inSkip) out.push(el.textContent.trim() + '.');
        } else if (!inSkip) {
          // pega o texto inteiro do elemento (parágrafo, lista, tabela, box)
          const txt = el.textContent.replace(/\s+/g, ' ').trim();
          if (txt && txt.length > 3) out.push(txt);
        }
      });
      return out;
    }

    function speakNext() {
      if (idx >= chunks.length) {
        statusEl.textContent = '✅ Concluído';
        playBtn.style.display = '';
        pauseBtn.style.display = 'none';
        stopBtn.style.display = 'none';
        idx = 0;
        return;
      }
      const u = new SpeechSynthesisUtterance(chunks[idx]);
      const vIdx = parseInt(voiceEl.value);
      if (!isNaN(vIdx) && voices[vIdx]) {
        u.voice = voices[vIdx];
        u.lang = voices[vIdx].lang;
      } else {
        u.lang = 'pt-BR';
      }
      u.rate = parseFloat(speedEl.value) || 1;
      u.onend = () => {
        idx++;
        statusEl.textContent = idx + '/' + chunks.length;
        if (!window.speechSynthesis.paused) speakNext();
      };
      u.onerror = (e) => {
        statusEl.textContent = '⚠️ Erro: ' + (e.error || 'desconhecido');
        playBtn.style.display = '';
        pauseBtn.style.display = 'none';
        stopBtn.style.display = 'none';
      };
      window.speechSynthesis.speak(u);
    }

    playBtn.addEventListener('click', () => {
      window.speechSynthesis.cancel();
      chunks = getChunks();
      idx = 0;
      if (chunks.length === 0) {
        statusEl.textContent = 'Nada para ler.';
        return;
      }
      statusEl.textContent = '0/' + chunks.length;
      playBtn.style.display = 'none';
      pauseBtn.style.display = '';
      pauseBtn.textContent = '⏸️ Pausar';
      stopBtn.style.display = '';
      speakNext();
    });

    pauseBtn.addEventListener('click', () => {
      if (window.speechSynthesis.paused) {
        window.speechSynthesis.resume();
        pauseBtn.textContent = '⏸️ Pausar';
      } else {
        window.speechSynthesis.pause();
        pauseBtn.textContent = '▶️ Continuar';
      }
    });

    stopBtn.addEventListener('click', () => {
      window.speechSynthesis.cancel();
      chunks = [];
      idx = 0;
      playBtn.style.display = '';
      pauseBtn.style.display = 'none';
      stopBtn.style.display = 'none';
      statusEl.textContent = '';
    });

    speedEl.addEventListener('change', () => {
      if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
        window.speechSynthesis.cancel();
        if (idx > 0) idx--;
        speakNext();
      }
    });

    // Cancela ao sair da página
    window.addEventListener('beforeunload', () => window.speechSynthesis.cancel());

    // Limpa chaves de localStorage do Piper (feature removida)
    localStorage.removeItem('concurso-mpmg-use-piper');
    localStorage.removeItem('concurso-mpmg-piper-voice');
  })();

  } /* end if(!isStub) for setup */

  // ---- Navegação prev/next ----
  const adj = App.getAdjacentTopics(id);
  const navEl = document.getElementById('topic-nav');
  const prefix = _matMeta.prefix;
  navEl.innerHTML = '';
  if (adj.prev) {
    navEl.appendChild(App.el('a', { href: `topicos.html?id=${adj.prev.id}` }, `← ${prefix}${adj.prev.num}: ${adj.prev.title}`));
  } else {
    navEl.appendChild(App.el('a', { class: 'nav-disabled', href: '#' }, '← (primeiro)'));
  }
  navEl.appendChild(App.el('a', { href: 'index.html#bloco-2' }, '↑ Painel'));
  if (adj.next) {
    navEl.appendChild(App.el('a', { href: `topicos.html?id=${adj.next.id}` }, `${prefix}${adj.next.num}: ${adj.next.title} →`));
  } else {
    navEl.appendChild(App.el('a', { class: 'nav-disabled', href: '#' }, '(último) →'));
  }
})();
</script>
